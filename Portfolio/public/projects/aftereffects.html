<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon</title>

    <!-- Tailwind CDN (om du inte använder Vite/PostCSS) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Poppins font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
        theme: {
            extend: {
            fontFamily: {
                poppins: ['Poppins', 'sans-serif']
            },
            colors: {
                brandYellow: '#f7e41c'
            }
            }
        }
        }
    </script>
</head>
<body class="m-0 p-0 box-border bg-white text-black font-poppins antialiased">
    <header class="fixed top-0 w-full z-50 px-20 py-6 flex justify-between items-center backdrop-blur-md bg-black/40 border-b border-white/5 max-md:px-6 text-white">

        <div class="text-xl font-semibold tracking-widest">
            <a href="/">PORTFOLIO<span class="text-brandYellow">.</span></a>
        </div>

        <nav class="space-x-10 text-sm uppercase tracking-wider">
            <a href="/" class="hover:text-brandYellow transition">Back</a>
        </nav>

    </header>

    <section class="pt-40 pb-24 px-24 max-md:px-8">

        <p class="mt-8 px-8 py-4 bg-brandYellow text-black font-semibold rounded-full transition duration-300 inline-block ">
            Case Study
        </p>

        <h1 class="text-5xl leading-tight font-bold mt-4 max-md:text-3xl">
            PR <br> After Effects Animation
        </h1>

        <p class="mt-6 max-w-3xl text-black/70 leading-relaxed">
            En kollektion av korta animerade klipp skapade i After Effects som en del av PR-projekt för att marknadsföra olika evenemang. 
            <br>
        </p>

    </section>

    <section class="px-24 max-md:px-8">

        <div class="relative rounded-3xl overflow-hidden shadow-2xl">
            <img src="https://res.cloudinary.com/dgcqgxkla/image/upload/v1771493462/Screenshot_2026-02-19_at_10.30.28_mtyx1c.png"
                class="w-full h-[70vh] object-contain" />

            <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-black/5 to-transparent"></div>
        </div>

    </section>

    <section class="px-24 py-24 max-md:px-8">

        <div class="grid grid-cols-3 gap-20 max-md:grid-cols-1">

            <div>
            <p class="text-white/50 uppercase text-sm tracking-widest">Roll</p>
            <p class="mt-2 font-semibold">Animation Designer</p>
            </div>

            <div>
            <p class="text-white/50 uppercase text-sm tracking-widest">Verktyg</p>
            <p class="mt-2 font-semibold">After Effects</p>
            </div>

            <div>
            <p class="text-white/50 uppercase text-sm tracking-widest">År</p>
            <p class="mt-2 font-semibold">2024-2025</p>
            </div>

        </div>

    </section>
    
    <section class="px-24 pb-32 max-md:px-8">
        <h2 class="text-3xl font-bold mb-12">
            Projektgalleri
        </h2>
        <div class="relative w-full ">
    
            <div class="relative">
                <div class="overflow-hidden rounded-3xl shadow-2xl bg-[#111]">

                    <div id="carousel" class="flex transition-transform duration-700 ease-out">
                        

                        <div class="min-w-full flex items-center justify-center h-[600px] p-10">
                        <video src="https://res.cloudinary.com/dgcqgxkla/video/upload/v1771324432/render_3_cmfvuk.mp4"
                            class="max-h-full max-w-full object-contain hover:scale-105 transition duration-700"
                            alt="Bild 1" controls>
                        </video>
                        </div>

                        <div class="min-w-full flex items-center justify-center h-[600px] p-10">
                            <video src="https://res.cloudinary.com/dgcqgxkla/video/upload/v1771324435/Tryckionen_animation_1_exv8h5.mp4"
                                class="max-h-full max-w-full object-contain hover:scale-105 transition duration-700"
                                alt="Bild 2" controls>
                            </video>
                        </div>

                        

                        <div class="min-w-full flex items-center justify-center h-[600px] p-10">
                        <video src="https://res.cloudinary.com/dgcqgxkla/video/upload/v1771324426/teaserTB_sxiroe.mp4"
                            class="max-h-full max-w-full object-contain hover:scale-105 transition duration-700"
                            alt="Bild 3" controls>
                        </video>
                        </div>

    
                    </div>
                </div>

            </div>

            <button onclick="prevSlide()"
            class="absolute left-6 top-1/2 -translate-y-1/2 bg-white/10 backdrop-blur-md 
            border border-white/10 text-white px-5 py-3 rounded-full hover:bg-brandYellow hover:text-black transition">
            ❮
            </button>

            <button onclick="nextSlide()"
            class="absolute right-6 top-1/2 -translate-y-1/2 bg-white/10 backdrop-blur-md 
            border border-white/10 text-white px-5 py-3 rounded-full hover:bg-brandYellow hover:text-black transition">
            ❯
            </button>

        </div>
    </section>

<script>
    const carousel = document.getElementById("carousel");
    const slides = carousel.children;
    let index = 0;

    function updateCarousel() {
      carousel.style.transform = `translateX(-${index * 100}%)`;
    }

    function nextSlide() {
      index = (index + 1) % slides.length;
      updateCarousel();
    }

    function prevSlide() {
      index = (index - 1 + slides.length) % slides.length;
      updateCarousel();
    }
  </script>
<script type="module" src="/src/filter.ts"></script>
</body>
</html>
